spring.application.name=Lancit
spring.config.import=optional:classpath:application-secret.properties

# ── 서버 ──────────────────────────────────────────────────────
server.port=8080
 
# ── DB (MySQL) ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/lancit?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=lancit
spring.datasource.password=lancit602!!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# ── MyBatis ───────────────────────────────────────────────────
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.ssafy.lancit.domain
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-handlers-package=com.ssafy.lancit.common.config
 
# ── JWT ───────────────────────────────────────────────────────
jwt.secret=your_jwt_secret_key_base64_encoded_min_32_chars
jwt.access-token-expiration=86400000
jwt.refresh-token-expiration=604800000


# ── GMAIL SMTP ───────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
 
# ── GCS ───────────────────────────────────────────────────────
gcs.bucket-name=lancit-bucket
gcs.credentials-path=classpath:gcs-key.json


 
# ── STOMP ─────────────────────────────────────────────────────
stomp.allowed-origins=http://localhost:5173
 
# ── 파일 업로드 ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
 
# ── 스케줄러 ──────────────────────────────────────────────────
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=scheduler-
 
# ── 로깅 ──────────────────────────────────────────────────────
logging.level.com.ssafy.lancit=DEBUG
logging.level.org.mybatis=DEBUG


#── 레디스 ──────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=518400000

#── 스웨거 ──────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs