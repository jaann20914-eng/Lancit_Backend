spring.application.name=Lancit


# ── 서버 ──────────────────────────────────────────────────────
server.port=8080
 
# ── DB (MySQL) ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/lancit?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# ── MyBatis ───────────────────────────────────────────────────
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.lancit.domain
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-handlers-package=com.lancit.common.config
 
# ── JWT ───────────────────────────────────────────────────────
jwt.secret=your_jwt_secret_key_base64_encoded_min_32_chars
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000
 
# ── GCS ───────────────────────────────────────────────────────
gcs.bucket-name=lancit-bucket
gcs.credentials-path=classpath:gcs-key.json

 
# ── STOMP ─────────────────────────────────────────────────────
stomp.allowed-origins=http://localhost:3000
 
# ── 파일 업로드 ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
 
# ── 스케줄러 ──────────────────────────────────────────────────
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=scheduler-
 
# ── 로깅 ──────────────────────────────────────────────────────
logging.level.com.lancit=DEBUG
logging.level.org.mybatis=DEBUG